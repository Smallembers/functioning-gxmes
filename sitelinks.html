<html>

<head>
    <title>otherlinks</title>
    <style>
        /* Spacing for link groups */
        .link-container {
            margin-bottom: 15px;
        }
        button {
            margin-right: 10px;
            padding: 5px 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>
    <h3>MY Links >:)))))</h3>

    <div class="link-container">
        <strong>gn-math (a bit broken)</strong>
        <button onclick="openLinkCloaked('https://gn-math-apk.pages.dev/')">Open in About:Blank</button>
        <button onclick="openLinkNormally('https://gn-math-apk.pages.dev//')">Open Normally</button>
    </div>

    <div class="link-container">
        <strong>selenite</strong>
        <button onclick="openLinkCloaked('https://seleniteclone.mapadelapolicia.com/')">Open in About:Blank</button>
        <button onclick="openLinkNormally('https://seleniteclone.mapadelapolicia.com/')">Open Normally</button>
    </div>

    <div class="link-container">
        <strong>Item 3:</strong>
        <button onclick="openLinkCloaked('https://example.com/item3')">Open in About:Blank</button>
        <button onclick="openLinkNormally('https://example.com/item3')">Open Normally</button>
    </div>

    <p>yay i fixed and updated it :3</p>

    <script>
        // These functions handle the logic for any URL provided
        function openLinkCloaked(url) {
            const win = window.open();
            if (win) {
                win.document.body.style.margin = '0'; // Remove default margin
                const iframe = win.document.createElement('iframe');
                iframe.style.width = "100%";
                iframe.style.height = "100%";
                iframe.style.border = "none";
                iframe.src = url;
                win.document.body.appendChild(iframe);
            }
        }
        
        function openLinkNormally(url) {
            window.open(url, '_blank');
        }
    </script>
</body>

</html>
